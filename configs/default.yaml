model:
  name: blip2_vqa                    # blip2_vqa | concat_fusion | bilinear_fusion | attention_fusion | mlb_fusion
                                     # | mfb_fusion | cross_attn_fusion | qformer_scratch | perceiver_resampler
  blip2_model_name: Salesforce/blip2-opt-2.7b
  num_query_tokens: 32
  vision_width: 1024                 # ViT-L/14 (CLIP) output dim — matches pre_extract_features.py cache
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  intermediate_size: 3072
  dropout: 0.1
  max_answer_length: 10
  # For fusion baselines
  fusion_output_size: 1024
  num_answers: 3129              # VQAv2 answer vocabulary size

data:
  train_annotation: data/raw/v2_OpenEnded_mscoco_train2014_questions.json
  val_annotation: data/raw/v2_OpenEnded_mscoco_val2014_questions.json
  train_answers: data/raw/v2_mscoco_train2014_annotations.json
  val_answers: data/raw/v2_mscoco_val2014_annotations.json
  train_image_dir: data/raw/train2014
  val_image_dir: data/raw/val2014
  answer_list: data/raw/answer_list.json
  max_question_length: 50
  image_size: 224
  num_workers: 4

training:
  output_dir: checkpoints/
  log_dir: logs/
  num_epochs: 10
  batch_size: 32
  eval_batch_size: 64
  learning_rate: 1e-4
  weight_decay: 0.05
  warmup_steps: 1000
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  save_every: 1
  eval_every: 1
  seed: 42
  mixed_precision: true
  resume_from: null

optimizer:
  name: adamw
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  name: cosine
  min_lr: 1e-6

logging:
  use_wandb: false
  project: blip2-vqa-experiment
  run_name: null
